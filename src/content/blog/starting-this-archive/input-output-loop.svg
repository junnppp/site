<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" width="720" height="190"
     font-family="Pretendard, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A8A8A"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 배경 카드 (아이보리 — 페이지 배경과 구분 + 다크모드에서도 항상 밝게) -->
  <rect x="0.6" y="0.6" width="718.8" height="188.8" rx="14" fill="#F8F1E1" stroke="#DFD5C0" stroke-width="1.2"/>

  <!-- 인풋 박스 (muted blue) -->
  <g filter="url(#sh)">
    <rect x="90" y="44" width="210" height="110" rx="12" fill="#DDE7EE" stroke="#8AA6BC" stroke-width="1.5"/>
    <text x="195" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#44586A">인풋 (INPUT)</text>
    <text x="195" y="116" text-anchor="middle" font-size="11.5" fill="#708496">학습 · 지식 · 경험</text>
  </g>

  <!-- 아웃풋 박스 (muted clay) -->
  <g filter="url(#sh)">
    <rect x="420" y="44" width="210" height="110" rx="12" fill="#F2DAD4" stroke="#C39A90" stroke-width="1.5"/>
    <text x="525" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#6E5048">아웃풋 (OUTPUT)</text>
    <text x="525" y="116" text-anchor="middle" font-size="11.5" fill="#8F726A">나만의 글쓰기 · 정리</text>
  </g>

  <!-- 위 화살표: 인풋 → 아웃풋 -->
  <text x="360" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">글쓰기로 변환</text>
  <path d="M 304 86 L 416 86" stroke="#8A8A8A" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>

  <!-- 아래 화살표: 아웃풋 → 인풋 -->
  <path d="M 416 112 L 304 112" stroke="#8A8A8A" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
  <text x="360" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">능동적 회상 · 체화</text>
</svg>
